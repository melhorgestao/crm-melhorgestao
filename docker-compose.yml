services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: melhorgestao_app
    restart: always
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.melhorgestao.rule=PathPrefix(`/`)'
      - 'traefik.http.services.melhorgestao.loadbalancer.server.port=80'
    networks:
      - proxy

networks:
  proxy:
    external: true
